<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カード明細マネージャー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#0071e3;--accent-light:#e8f2ff;--border:#d2d2d7;--danger:#ff3b30;--success:#34c759;--hover:#f0f0f5}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px 32px;width:320px;text-align:center;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-box h2{font-size:18px;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--sub);margin-bottom:20px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;text-align:center;margin-bottom:12px;letter-spacing:2px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:10px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#005bb5}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none}

.container{max-width:1100px;margin:0 auto;padding:16px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 0;position:sticky;top:0;z-index:100}
header .container{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1{font-size:17px;font-weight:600;white-space:nowrap}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--hover)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#005bb5}
.btn-danger{color:var(--danger);border-color:var(--danger)}
.btn-sm{padding:4px 10px;font-size:11px}

.tabs{display:flex;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border);margin:12px 0}
.tab{flex:1;padding:7px 8px;text-align:center;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--sub)}
.tab.active{background:var(--accent);color:#fff}

.quick-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.qf{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s}
.qf:hover{border-color:var(--accent);color:var(--accent)}
.qf.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--card)}
.filter-row input[type="text"]{flex:1;min-width:120px}
.filter-row input[type="month"]{width:130px}
.filter-row label{font-size:11px;color:var(--sub)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}

.table-wrap{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{background:#f8f8fa;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--sub);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:background .1s}
th:hover{background:#eaeaef}
th.sorted{color:var(--accent)}
th .arrow{font-size:9px;margin-left:3px;opacity:.5}
th.sorted .arrow{opacity:1}
td{padding:7px 10px;border-bottom:1px solid #f0f0f2;white-space:nowrap}
tr:hover td{background:var(--hover)}
.amount{text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
.amount.neg{color:var(--danger)}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.summary-row td{font-weight:600;background:#f8f8fa;border-top:2px solid var(--border)}
.bar-cell{display:flex;align-items:center;gap:6px}
.bar-bg{height:6px;border-radius:3px;background:var(--accent);opacity:.7;transition:width .3s}

.chart-wrap{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.chart-container{position:relative;width:100%;height:280px}

.upload-area{border:2px dashed var(--border);border-radius:12px;padding:32px 16px;text-align:center;margin:12px 0;cursor:pointer;transition:all .2s;background:var(--card)}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--accent-light)}
.upload-area input{display:none}

.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin:10px 0;font-size:12px}

.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:14px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub)}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .filter-row{flex-direction:column}
  .filter-row select,.filter-row input{width:100%}
  h1{font-size:14px}
  .chart-container{height:220px}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>🔒 ログイン</h2>
    <p>カード明細マネージャー</p>
    <input type="password" id="loginPass" placeholder="パスワード" autofocus onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<header>
  <div class="container">
    <h1>💳 カード明細マネージャー</h1>
    <div class="header-actions">
      <span id="dataCount" style="font-size:11px;color:var(--sub)"></span>
      <label class="btn btn-primary" for="csvInput">CSV追加</label>
      <input type="file" id="csvInput" accept=".csv" multiple style="display:none">
      <button class="btn" onclick="exportCSV()">CSV出力</button>
      <button class="btn btn-danger btn-sm" onclick="confirmClear()">全削除</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="uploadSection">
    <label class="upload-area" for="csvInput2" id="dropZone">
      <input type="file" id="csvInput2" accept=".csv" multiple>
      <div style="font-size:28px;margin-bottom:6px">📂</div>
      <div style="font-size:14px">クレジットカード明細CSVをドラッグ or クリック</div>
      <div style="font-size:12px;color:var(--sub)">Shift-JIS / UTF-8 対応・複数ファイル可</div>
    </label>
  </div>

  <div id="globalFilter">
    <div class="quick-filters" id="quickFilters"></div>
    <div class="filter-row">
      <input type="month" id="gFrom" title="開始月">
      <span style="color:var(--sub);font-size:12px">〜</span>
      <input type="month" id="gTo" title="終了月">
      <select id="gUser"><option value="">全利用者</option></select>
      <select id="gCat"><option value="">全カテゴリ</option></select>
      <input type="text" id="gSearch" placeholder="店舗名で検索...">
    </div>
  </div>

  <div id="statsBar" class="stats"></div>

  <div class="tabs">
    <div class="tab active" data-tab="list" onclick="switchTab('list')">明細一覧</div>
    <div class="tab" data-tab="category" onclick="switchTab('category')">カテゴリ別</div>
    <div class="tab" data-tab="store" onclick="switchTab('store')">店舗別</div>
    <div class="tab" data-tab="monthly" onclick="switchTab('monthly')">月別推移</div>
  </div>

  <div id="listView">
    <div class="table-wrap"><table>
      <thead><tr id="listHeader"></tr></thead>
      <tbody id="listBody"></tbody>
    </table></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="categoryView" style="display:none">
    <div class="chart-wrap"><div class="chart-container"><canvas id="catChart"></canvas></div></div>
    <div class="table-wrap"><table>
      <thead><tr id="catHeader"></tr></thead>
      <tbody id="catBody"></tbody>
    </table></div>
  </div>

  <div id="storeView" style="display:none">
    <div class="table-wrap"><table>
      <thead><tr id="storeHeader"></tr></thead>
      <tbody id="storeBody"></tbody>
    </table></div>
  </div>

  <div id="monthlyView" style="display:none">
    <div class="chart-wrap"><div class="chart-container"><canvas id="monthChart"></canvas></div></div>
    <div class="table-wrap"><table>
      <thead><tr id="monthHeader"></tr></thead>
      <tbody id="monthBody"></tbody>
    </table></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>カテゴリ編集</h2>
    <p style="font-size:13px;color:var(--sub);margin-bottom:12px" id="editStoreName"></p>
    <select id="editCatSelect" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px"></select>
    <input type="text" id="editCatCustom" placeholder="新しいカテゴリ名..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:16px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCategory()">この店舗すべてに適用</button>
    </div>
  </div>
</div>

<script>
const PASS_HASH='e7abb8193df165bc785e979482064db612ea9a3984cfe85a88d629ffba67f721';
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function doLogin(){const h=await sha256(document.getElementById('loginPass').value);if(h===PASS_HASH){sessionStorage.setItem('kakeibo_auth','1');document.getElementById('loginScreen').style.display='none'}else{document.getElementById('loginError').style.display='block';document.getElementById('loginPass').value=''}}
if(sessionStorage.getItem('kakeibo_auth')==='1')document.getElementById('loginScreen').style.display='none';

const STORAGE_KEY='kakeibo_data',CATS_KEY='kakeibo_custom_cats',PAGE_SIZE=100;
const CAT_RULES=[
  ["スーパー・食料品",["オオゼキ","サミット","まいばすけっと","ライフバランス","イオンビッグ"]],
  ["コンビニ",["セブンイレブン","ローソン","ファミリーマート"]],
  ["ドラッグストア",["ココカラファイン","クリエイトエス","たから薬局","ドラッグ","ツルハ"]],
  ["外食・飲食",["サイゼリヤ","バーガーキング","マクドナルド","ガスト","鶏バル","SHUNSE","フットニック","スターバックス","カルディコーヒー","ジーリー","ナヒライ","鳥貴族","まぐろ","ダイニング","ぞうすい","コメダ","バルコンティ","ルミネスト","焼肉","居酒屋","経堂コルティ","砂場","杉玉","ＶＡＮＳＡＮ","地どり","ます家","ビッグエコー","酒蔵","丸亀","吉野家","松屋","すき家","CoCo","ほねつぎ","カラオケ"]],
  ["通信費",["ＤＴＩ・ＴＯＮＥ","インターネットイニシアティブ","楽天モバイル通信料","ソニーネットワーク","ＴＵＴＯ・ＰＨＯＮＥ"]],
  ["交通費",["モバイルＰＡＳＭＯ","タイムズカー","ＥＴＣ","LUUP","ＪＲ東日本","ＪＲ西日本","小田急電鉄","ＪＡＬ","九州旅客鉄道"]],
  ["保険",["ＳＯＭＰＯひまわり","ジェイアイ火災保険"]],
  ["医療",["ふじないかくりにっく","百瀬歯科","はやしだ","林田整形","眼科","はやし矯正","多摩病院","くじら堂鍼灸","とよしま内視鏡","クリニック","歯科","整骨"]],
  ["教育・学校",["首都圏模試","学研","プリントコーポ","ベッシー学童","ことぶき塾","学校法人","八雲学園","Ａｃａｄｅｍｉｃｏ"]],
  ["日用品・雑貨",["アマゾン","Amazon","ユニクロ","SP WEGO","SP CREATOR","チャレンジウェブ","セリア","ヤマトヤ","フランフラン","モンテリア","フリマ","メルカリ","写真スタジオ","PLEADY","カニパラダイス","ニトリ","渋谷ロフト","ラクテンファッション","漫画全巻","楽天ビック","きくや美粧堂","SP RASIK","アルペン楽天","GOOGLE*GOOGLE STORE","スウォッチ","出西窯","業務スーパー","Ｅｄｙチャージ","ＡｍａｚｏｎＰａｙ"]],
  ["光熱費",["東京ガス","電気"]],
  ["住居・生活",["ポニークリーニング","大手門タワー","ワコーグラス","ＴＩＰ補修","ＴＩＰ通常"]],
  ["旅行・レジャー",["楽天トラベル","ちゅらとく","チャンピオンシップ","イオンシネマ","まるしん","花園セイ","よこすか","みなべ","おらぶの温泉","カルビー","千葉県","イープラス","金城館","アソビュー","ジ　アウトレット","ＦＯＴＯシネマズ"]],
  ["通販・ネット",["ＵＤＥＭＹ","UDEMYJP","アップルストア","ヨドバシカメラ"]],
  ["振替・手数料",["口座振替","分割払い","ペイフレックス手数料","一括払いから","元本分ご請求","一括払いへの変更","残元本一括請求","お支払いありがとう"]],
  ["年会費・ポイント",["キャッシュバック","ポイント一括","ポイント（カードクレジ","ポイント充当","基本カード年会費"]],
  ["税金",["申告所得税"]],
];
const CAT_COLORS=['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5ac8fa','#ff2d55','#007aff','#ffcc00','#5856d6','#64d2ff','#30b0c7','#a2845e','#8e8e93','#636366','#48484a','#aeaeb2'];

let allData=[],customCats={},currentTab='list',currentPage=1;
let sorts={list:{col:'date',asc:false},category:{col:'total',asc:false},store:{col:'total',asc:false},monthly:{col:'ym',asc:false}};
let activeQuickFilter='all';
let catChartInstance=null,monthChartInstance=null;

function init(){
  allData=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  customCats=JSON.parse(localStorage.getItem(CATS_KEY)||'{}');
  setupEvents();
  if(allData.length){document.getElementById('uploadSection').style.display='none';refresh()}
  updateCount();
}

function setupEvents(){
  [document.getElementById('csvInput'),document.getElementById('csvInput2')].forEach(el=>el.addEventListener('change',e=>handleFiles(e.target.files)));
  const dz=document.getElementById('dropZone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files)});
  ['gFrom','gTo','gUser','gCat','gSearch'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{activeQuickFilter='custom';renderQuickFilters();currentPage=1;renderAll()});
  });
}

function categorize(store){
  if(customCats[store])return customCats[store];
  for(const[cat,kws]of CAT_RULES)for(const kw of kws)if(store.includes(kw))return cat;
  return'その他';
}

async function handleFiles(files){
  let added=0;
  const keys=new Set(allData.map(r=>`${r.date}|${r.procDate}|${r.store}|${r.user}|${r.amount}`));
  for(const file of files){
    const buf=await file.arrayBuffer();
    let text;
    try{text=new TextDecoder('shift_jis').decode(buf);if(!text.includes('利用日'))text=new TextDecoder('utf-8').decode(buf)}catch{text=new TextDecoder('utf-8').decode(buf)}
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    for(let i=1;i<lines.length;i++){
      const c=parseCSV(lines[i]);if(c.length<6)continue;
      const date=c[0].trim(),procDate=c[1].trim(),store=c[2].trim(),user=c[3].trim();
      const amt=parseInt(c[5].trim().replace(/[",]/g,''),10);
      if(!date||isNaN(amt))continue;
      const k=`${date}|${procDate}|${store}|${user}|${amt}`;
      if(keys.has(k))continue;keys.add(k);
      allData.push({date,procDate,store,user,amount:amt,category:categorize(store)});added++;
    }
  }
  allData.sort((a,b)=>b.date.localeCompare(a.date));
  save();document.getElementById('uploadSection').style.display='none';
  refresh();toast(`${added}件追加（合計${allData.length}件）`);
}

function parseCSV(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c);c=''}else c+=ch}}r.push(c);return r}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(allData));localStorage.setItem(CATS_KEY,JSON.stringify(customCats));updateCount()}
function updateCount(){document.getElementById('dataCount').textContent=allData.length?`${allData.length}件`:''}

function refresh(){populateFilters();renderQuickFilters();renderAll()}

function populateFilters(){
  const users=[...new Set(allData.map(r=>r.user))].sort();
  const cats=[...new Set(allData.map(r=>r.category))].sort();
  const uSel=document.getElementById('gUser'),cSel=document.getElementById('gCat');
  const uv=uSel.value,cv=cSel.value;
  uSel.innerHTML='<option value="">全利用者</option>'+users.map(u=>`<option>${u}</option>`).join('');
  cSel.innerHTML='<option value="">全カテゴリ</option>'+cats.map(c=>`<option>${c}</option>`).join('');
  uSel.value=uv;cSel.value=cv;
}

function renderQuickFilters(){
  const years=[...new Set(allData.map(r=>r.date.slice(0,4)))].sort().reverse();
  const now=new Date();
  const thisM=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const presets=[
    {id:'all',label:'全期間'},
    {id:'thisMonth',label:'今月'},
    {id:'last3',label:'直近3ヶ月'},
    {id:'last6',label:'直近6ヶ月'},
    {id:'last12',label:'直近12ヶ月'},
    ...years.map(y=>({id:'y_'+y,label:y+'年'}))
  ];
  document.getElementById('quickFilters').innerHTML=presets.map(p=>
    `<div class="qf${activeQuickFilter===p.id?' active':''}" onclick="applyQuick('${p.id}')">${p.label}</div>`
  ).join('');
}

function applyQuick(id){
  activeQuickFilter=id;
  const f=document.getElementById('gFrom'),t=document.getElementById('gTo');
  const now=new Date();
  if(id==='all'){f.value='';t.value=''}
  else if(id==='thisMonth'){const m=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;f.value=m;t.value=m}
  else if(id.startsWith('last')){
    const n=parseInt(id.replace('last',''));
    const from=new Date(now.getFullYear(),now.getMonth()-n+1,1);
    f.value=`${from.getFullYear()}-${String(from.getMonth()+1).padStart(2,'0')}`;t.value=''
  }
  else if(id.startsWith('y_')){const y=id.slice(2);f.value=y+'-01';t.value=y+'-12'}
  renderQuickFilters();currentPage=1;renderAll();
}

function getFiltered(){
  let d=[...allData];
  const from=document.getElementById('gFrom').value,to=document.getElementById('gTo').value;
  const user=document.getElementById('gUser').value,cat=document.getElementById('gCat').value;
  const search=document.getElementById('gSearch').value.toLowerCase();
  if(from){const ym=from.replace('-','/');d=d.filter(r=>r.date.slice(0,7).replace('-','/')>=ym)}
  if(to){const ym=to.replace('-','/');d=d.filter(r=>r.date.slice(0,7).replace('-','/')<=ym)}
  if(user)d=d.filter(r=>r.user===user);
  if(cat)d=d.filter(r=>r.category===cat);
  if(search)d=d.filter(r=>r.store.toLowerCase().includes(search));
  return d;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  ['listView','categoryView','storeView','monthlyView'].forEach(v=>document.getElementById(v).style.display='none');
  document.getElementById(tab+'View').style.display='';
  renderAll();
}

function renderAll(){
  renderStats();
  if(currentTab==='list')renderList();
  else if(currentTab==='category')renderCategory();
  else if(currentTab==='store')renderStore();
  else if(currentTab==='monthly')renderMonthly();
}

function renderStats(){
  const data=getFiltered();
  const pos=data.filter(r=>r.amount>0);
  const total=pos.reduce((s,r)=>s+r.amount,0);
  const months=new Set(data.map(r=>r.date.slice(0,7)));
  const avg=months.size?Math.round(total/months.size):0;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-label">件数</div><div class="stat-value">${data.length.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">支出合計</div><div class="stat-value">¥${total.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">月平均</div><div class="stat-value">¥${avg.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">対象期間</div><div class="stat-value">${months.size}ヶ月</div></div>`;
}

function sortIcon(tab,col){const s=sorts[tab];return`<span class="arrow">${s.col===col?(s.asc?'▲':'▼'):'⇅'}</span>`}
function thClass(tab,col){return sorts[tab].col===col?'sorted':''}
function doSort(tab,col){if(sorts[tab].col===col)sorts[tab].asc=!sorts[tab].asc;else{sorts[tab]={col,asc:col==='date'||col==='ym'?false:true}};renderAll()}

function renderList(){
  const data=getFiltered();
  const s=sorts.list;
  document.getElementById('listHeader').innerHTML=[
    {k:'date',l:'利用日'},{k:'store',l:'利用内容'},{k:'user',l:'利用者'},{k:'amount',l:'金額',right:1},{k:'category',l:'カテゴリ'}
  ].map(c=>`<th class="${thClass('list',c.k)}" style="${c.right?'text-align:right':''}" onclick="doSort('list','${c.k}')">${c.l}${sortIcon('list',c.k)}</th>`).join('')+'<th style="width:32px"></th>';

  const sorted=[...data].sort((a,b)=>{
    let va=a[s.col],vb=b[s.col];
    if(s.col==='amount')return s.asc?va-vb:vb-va;
    return s.asc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });
  const tp=Math.max(1,Math.ceil(sorted.length/PAGE_SIZE));
  if(currentPage>tp)currentPage=tp;
  const page=sorted.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  const body=document.getElementById('listBody');
  if(!page.length){body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--sub)">データがありません</td></tr>'}
  else{body.innerHTML=page.map(r=>`<tr>
    <td>${r.date}</td>
    <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis" title="${esc(r.store)}">${esc(r.store)}</td>
    <td>${esc(r.user)}</td>
    <td class="amount${r.amount<0?' neg':''}">${r.amount.toLocaleString()}</td>
    <td><span class="cat-badge">${esc(r.category)}</span></td>
    <td><button class="btn btn-sm" onclick="openEdit('${esc(r.store)}')">✏</button></td>
  </tr>`).join('')}
  document.getElementById('pagination').innerHTML=tp>1?`
    <button class="btn btn-sm" onclick="currentPage--;renderList()" ${currentPage<=1?'disabled':''}>← 前</button>
    <span style="color:var(--sub)">${currentPage} / ${tp}（${sorted.length}件）</span>
    <button class="btn btn-sm" onclick="currentPage++;renderList()" ${currentPage>=tp?'disabled':''}>次 →</button>`:'';
}

function renderCategory(){
  const data=getFiltered().filter(r=>r.amount>0);
  const map={};
  data.forEach(r=>{if(!map[r.category])map[r.category]={count:0,total:0};map[r.category].count++;map[r.category].total+=r.amount});
  let entries=Object.entries(map);
  const s=sorts.category;
  entries.sort((a,b)=>{
    if(s.col==='category')return s.asc?a[0].localeCompare(b[0]):b[0].localeCompare(a[0]);
    if(s.col==='count')return s.asc?a[1].count-b[1].count:b[1].count-a[1].count;
    if(s.col==='avg'){const aa=a[1].total/a[1].count,bb=b[1].total/b[1].count;return s.asc?aa-bb:bb-aa}
    return s.asc?a[1].total-b[1].total:b[1].total-a[1].total;
  });
  const grand=entries.reduce((s,e)=>s+e[1].total,0);
  const maxVal=Math.max(...entries.map(e=>e[1].total),1);

  document.getElementById('catHeader').innerHTML=[
    {k:'category',l:'カテゴリ'},{k:'count',l:'件数'},{k:'total',l:'合計金額',right:1},{k:'avg',l:'平均',right:1},{k:'pct',l:'割合/構成比'}
  ].map(c=>`<th class="${thClass('category',c.k)}" style="${c.right?'text-align:right':''}" onclick="doSort('category','${c.k}')">${c.l}${c.k!=='pct'?sortIcon('category',c.k):''}</th>`).join('');

  document.getElementById('catBody').innerHTML=entries.map(([cat,v],i)=>{
    const pct=grand?(v.total/grand*100).toFixed(1):'0';
    const barW=Math.round(v.total/maxVal*100);
    return `<tr>
      <td><span class="cat-badge">${esc(cat)}</span></td>
      <td>${v.count}</td>
      <td class="amount">¥${v.total.toLocaleString()}</td>
      <td class="amount">¥${Math.round(v.total/v.count).toLocaleString()}</td>
      <td><div class="bar-cell"><div class="bar-bg" style="width:${barW}%;background:${CAT_COLORS[i%CAT_COLORS.length]}"></div><span style="font-size:11px;color:var(--sub)">${pct}%</span></div></td>
    </tr>`}).join('')+`<tr class="summary-row"><td>合計</td><td>${data.length}</td><td class="amount">¥${grand.toLocaleString()}</td><td></td><td></td></tr>`;

  if(catChartInstance)catChartInstance.destroy();
  const top8=Object.entries(map).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  catChartInstance=new Chart(document.getElementById('catChart'),{
    type:'doughnut',
    data:{labels:top8.map(e=>e[0]),datasets:[{data:top8.map(e=>e[1].total),backgroundColor:CAT_COLORS.slice(0,8),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:8,boxWidth:12,boxHeight:12}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ¥${ctx.parsed.toLocaleString()}`}}}}
  });
}

function renderStore(){
  const data=getFiltered().filter(r=>r.amount>0);
  const map={};
  data.forEach(r=>{if(!map[r.store])map[r.store]={store:r.store,category:r.category,count:0,total:0};map[r.store].count++;map[r.store].total+=r.amount});
  let entries=Object.values(map);
  const s=sorts.store;
  entries.sort((a,b)=>{
    if(s.col==='store')return s.asc?a.store.localeCompare(b.store):b.store.localeCompare(a.store);
    if(s.col==='category')return s.asc?a.category.localeCompare(b.category):b.category.localeCompare(a.category);
    if(s.col==='count')return s.asc?a.count-b.count:b.count-a.count;
    if(s.col==='avg'){const aa=a.total/a.count,bb=b.total/b.count;return s.asc?aa-bb:bb-aa}
    return s.asc?a.total-b.total:b.total-a.total;
  });
  const grand=entries.reduce((s,e)=>s+e.total,0);

  document.getElementById('storeHeader').innerHTML=[
    {k:'store',l:'店舗名'},{k:'category',l:'カテゴリ'},{k:'count',l:'件数'},{k:'total',l:'合計金額',right:1},{k:'avg',l:'平均',right:1}
  ].map(c=>`<th class="${thClass('store',c.k)}" style="${c.right?'text-align:right':''}" onclick="doSort('store','${c.k}')">${c.l}${sortIcon('store',c.k)}</th>`).join('');

  document.getElementById('storeBody').innerHTML=(entries.length?entries.map(v=>`<tr>
    <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis" title="${esc(v.store)}">${esc(v.store)}</td>
    <td><span class="cat-badge">${esc(v.category)}</span></td>
    <td>${v.count}</td>
    <td class="amount">¥${v.total.toLocaleString()}</td>
    <td class="amount">¥${Math.round(v.total/v.count).toLocaleString()}</td>
  </tr>`).join(''):'<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--sub)">該当なし</td></tr>')
  +`<tr class="summary-row"><td>合計（${entries.length}店舗）</td><td></td><td>${data.length}</td><td class="amount">¥${grand.toLocaleString()}</td><td></td></tr>`;
}

function renderMonthly(){
  const data=getFiltered().filter(r=>r.amount>0);
  const map={};
  data.forEach(r=>{const ym=r.date.slice(0,7);if(!map[ym])map[ym]={count:0,total:0};map[ym].count++;map[ym].total+=r.amount});
  let entries=Object.entries(map);
  const s=sorts.monthly;
  entries.sort((a,b)=>{
    if(s.col==='ym')return s.asc?a[0].localeCompare(b[0]):b[0].localeCompare(a[0]);
    if(s.col==='count')return s.asc?a[1].count-b[1].count:b[1].count-a[1].count;
    if(s.col==='avg'){const aa=a[1].total/a[1].count,bb=b[1].total/b[1].count;return s.asc?aa-bb:bb-aa}
    return s.asc?a[1].total-b[1].total:b[1].total-a[1].total;
  });
  const grand=entries.reduce((s,e)=>s+e[1].total,0);

  document.getElementById('monthHeader').innerHTML=[
    {k:'ym',l:'年月'},{k:'count',l:'件数'},{k:'total',l:'合計金額',right:1},{k:'avg',l:'平均',right:1}
  ].map(c=>`<th class="${thClass('monthly',c.k)}" style="${c.right?'text-align:right':''}" onclick="doSort('monthly','${c.k}')">${c.l}${sortIcon('monthly',c.k)}</th>`).join('');

  document.getElementById('monthBody').innerHTML=entries.map(([ym,v])=>`<tr>
    <td>${ym}</td><td>${v.count}</td>
    <td class="amount">¥${v.total.toLocaleString()}</td>
    <td class="amount">¥${Math.round(v.total/v.count).toLocaleString()}</td>
  </tr>`).join('')+`<tr class="summary-row"><td>合計（${entries.length}ヶ月）</td><td>${data.length}</td><td class="amount">¥${grand.toLocaleString()}</td><td class="amount">¥${entries.length?Math.round(grand/entries.length).toLocaleString():'0'}</td></tr>`;

  const chartData=Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  if(monthChartInstance)monthChartInstance.destroy();
  monthChartInstance=new Chart(document.getElementById('monthChart'),{
    type:'bar',
    data:{labels:chartData.map(e=>e[0].replace('20','')),datasets:[{label:'月別支出',data:chartData.map(e=>e[1].total),backgroundColor:'rgba(0,113,227,.6)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'¥'+ctx.parsed.y.toLocaleString()}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,autoSkip:false},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>(v/10000)+'万'},grid:{color:'rgba(0,0,0,.05)'}}}}
  });
}

function openEdit(store){
  document.getElementById('editStoreName').textContent=store;
  const cats=[...new Set(allData.map(r=>r.category))].sort();
  const sel=document.getElementById('editCatSelect');
  sel.innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
  sel.value=allData.find(r=>r.store===store)?.category||'その他';
  document.getElementById('editCatCustom').value='';
  document.getElementById('editModal').classList.add('open');
  window._editStore=store;
}
function closeModal(){document.getElementById('editModal').classList.remove('open')}
function saveCategory(){
  const cat=document.getElementById('editCatCustom').value.trim()||document.getElementById('editCatSelect').value;
  const store=window._editStore;
  customCats[store]=cat;
  allData.forEach(r=>{if(r.store===store)r.category=cat});
  save();closeModal();refresh();toast(`「${store}」→「${cat}」に変更`);
}

function exportCSV(){
  const h='利用日,処理日,利用内容,利用者,金額,カテゴリ\n';
  const rows=getFiltered().map(r=>`${r.date},${r.procDate},"${r.store}",${r.user},${r.amount},${r.category}`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+h+rows],{type:'text/csv'}));
  a.download=`カード明細_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function confirmClear(){if(confirm('全データを削除しますか？')){allData=[];customCats={};localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(CATS_KEY);document.getElementById('uploadSection').style.display='';refresh();toast('全データを削除しました')}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

init();
</script>
</body>
